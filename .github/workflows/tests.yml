name: tests

# This directory lives at packages/.github/ in the source monorepo; the public
# repo is a subtree split of packages/, so it lands at the repo root there.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: [visvoai-ai, visvoai-core, visvoai-cli]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - name: Install
        working-directory: ${{ matrix.package }}
        run: |
          uv venv
          uv pip install -e ../visvoai-ai -e ../visvoai-core -e ".[dev]" 2>/dev/null \
            || uv pip install -e ".[dev]"
      - name: Test
        working-directory: ${{ matrix.package }}
        run: uv run pytest -q
