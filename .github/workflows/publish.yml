name: publish

# PyPI publishing via Trusted Publishing (OIDC) — NO stored tokens anywhere.
# Fires when a GitHub Release is published with a per-package tag:
#   visvoai-cli-v0.14.4 · visvoai-core-v0.3.0 · visvoai-ai-v0.2.3 · visvoai-v0.1.0
# The tag prefix names the package directory to build; PyPI trusts this
# repo+workflow identity directly (configure once per project on pypi.org:
# Settings → Publishing → add GitHub publisher: VisvoAI/visvoai, publish.yml).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write          # the OIDC token IS the credential
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve package dir from tag
        id: pkg
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG="${TAG%-v*}"
          [ -d "$PKG" ] || { echo "no package dir for tag $TAG"; exit 1; }
          echo "dir=$PKG" >> "$GITHUB_OUTPUT"
      - name: Build sdist + wheel
        run: |
          python -m pip install --quiet build
          python -m build "${{ steps.pkg.outputs.dir }}" --outdir dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
