name: codeql
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 2"
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
